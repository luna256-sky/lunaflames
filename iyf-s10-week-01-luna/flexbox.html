<!doctype html
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    
    <style>
        .navbar {
            display: flex;
            background-color: #333;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
        }
        .navbar logo{
            color: white;
            font-size: 24px;
            font-weight: bold;

        }
        .navbar a{
            color: white;
            text-decoration: none;
            margin: 0 10px;
        }
        .navbar a:hover {
            text-decoration: underline;
            color:blue
        }
        .navbar a:visited{
            color:brown;
        }
        .navbar links{
            display: flex;
            gap: 20px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">My Website</div>
        <div class="links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </div>
    </nav>
    </body>
    </html>
