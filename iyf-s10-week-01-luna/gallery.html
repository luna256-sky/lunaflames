<html lang="en">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    
    <style>

    }
    </style>
</head> 

<body>
    
    <div class="gallery">
    <h1>Gallery</h1>

    <img src="https://images.pexels.com/photos/9407386/pexels-photo-9407386.jpeg" alt="wave">
    <img src="https://images.pexels.com/photos/34375615/pexels-photo-34375615.jpeg" alt="waterfall">
    <img src=""
  font-size: 0.95rem;
  color: #555;
  line-height: 1.4;
  margin-bottom: 15px;
}


.btn {
  display: inline-block;
  padding: 10px 15px;
  font-size: 0.9rem;
  font-weight: 600;
  text-decoration: none;
  border-radius: 5px;
  background-color: #007bff;
