<!DOCTYPE html>
<html lang="en">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    
    <style>
    .gallery {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
    }
    .gallery img {
        width: 200px;
        height: auto;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    </style>
</head> 

<body>
    
    <div class="gallery">
    <h1>Gallery</h1>
    <img src="https://images.pexels.com/photos/27058631/pexels-photo-27058631.png" alt="sunset">
    <img src="https://images.pexels.com/photos/9407386/pexels-photo-9407386.jpeg" alt="wave">
    <img src="https://images.pexels.com/photos/34375615/pexels-photo-34375615.jpeg" alt="waterfall">
    <img src="https://images.pexels.com/photos/17610011/pexels-photo-17610011.jpeg" alt="lightining">
</div>
</body>
