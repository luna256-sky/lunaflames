<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <link rel="stylesheet" href="main.css">
</html>
<body>
    <div class="card">
        <article class="card">
            <header>
                <h2>Beautiful sunset</h2>
            </header>
            <img src="https://images.pexels.com/photos/27058631/pexels-photo-27058631.png" alt="sunset">

            <div class="content"></div>
                <p>This is a simple card component. It can contain text, images, and other elements.</p>
            </div>
        </article>
        
    </div>

    <div class="button">
        <button>Read More</button>
    </div>


</body>
