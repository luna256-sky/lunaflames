<!DOCTYPE html>
<html lang="en">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    
    <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f4f4;
    }

    h1 {
      margin: 20px;
    }

    .gallery img {
      width: 200px;
      margin: 10px;
      border-radius: 10px;
    }

    .gallery img:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>
    <div class="gallery">
    <h1>Gallery</h1>
    <img src="https://images.pexels.com/photos/27058631/pexels-photo-27058631.png" alt="sunset">
    <img src="https://images.pexels.com/photos/9407386/pexels-photo-9407386.jpeg" alt="wave">
    <img src="https://images.pexels.com/photos/34375615/pexels-photo-34375615.jpeg" alt="waterfall">
    <img src="https://images.pexels.com/photos/9837044/pexels-photo-9837044.jpeg" alt="beach">
    </div>
</body>
</html>
